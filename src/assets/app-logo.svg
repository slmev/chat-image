<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="app-logo-title app-logo-desc">
  <title id="app-logo-title">AI Image Generator logo</title>
  <desc id="app-logo-desc">A chat bubble containing an image frame and AI spark.</desc>
  <defs>
    <linearGradient id="logo-bg" x1="9" x2="55" y1="7" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.52" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="logo-bubble" x1="15" x2="48" y1="17" y2="47" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dff7fb"/>
    </linearGradient>
    <linearGradient id="logo-frame" x1="20" x2="45" y1="24" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#164e63"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#logo-bg)"/>
  <circle cx="48" cy="15" r="5" fill="#fde68a" opacity="0.95"/>
  <circle cx="14" cy="51" r="8" fill="#22d3ee" opacity="0.22"/>
  <path d="M13 18.5C13 14.4 16.4 11 20.5 11h25C49.6 11 53 14.4 53 18.5v19C53 41.6 49.6 45 45.5 45H31.4l-8.7 7c-1.5 1.2-3.7.2-3.7-1.8v-6.1c-3.6-.7-6-3.8-6-7.6v-18Z" fill="url(#logo-bubble)" filter="url(#logo-shadow)"/>
  <rect x="20" y="23" width="25" height="17" rx="3.5" fill="url(#logo-frame)"/>
  <path d="m22.5 36.2 6-6c1.1-1.1 2.8-1.1 3.8 0l3.7 3.7 2.3-2.3c1-1 2.7-1 3.7 0l3 3V37c0 1.7-1.3 3-3 3H23.5c-1.1 0-2-.9-2-2 0-.7.4-1.3 1-1.8Z" fill="#ecfeff"/>
  <circle cx="40.2" cy="27.8" r="2.5" fill="#facc15"/>
  <path d="M48.4 18.8c.8 3.3 2.7 5.2 6 6-3.3.8-5.2 2.7-6 6-.8-3.3-2.7-5.2-6-6 3.3-.8 5.2-2.7 6-6Z" fill="#fef9c3"/>
  <path d="M17.7 18.6c.5 2.2 1.7 3.4 3.9 4-2.2.5-3.4 1.8-3.9 4-.5-2.2-1.8-3.4-4-4 2.2-.6 3.5-1.8 4-4Z" fill="#67e8f9"/>
</svg>
